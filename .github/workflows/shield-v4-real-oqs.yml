name: Shield v4 Real OQS ML-DSA Proof

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
  push:
    paths:
      - "src/adn_v3/v4/**"
      - "tests/test_v4_oqs_mldsa_backend.py"
      - "tests/test_v48g_real_oqs_mldsa_backend.py"
      - "scripts/assert_real_oqs_junit_not_skipped.py"
      - "docs/v4/REAL_CRYPTO_BACKEND.md"
      - "docs/v4/TEST_MATRIX.md"
      - "pyproject.toml"
      - ".github/workflows/shield-v4-real-oqs.yml"
  pull_request:
    paths:
      - "src/adn_v3/v4/**"
      - "tests/test_v4_oqs_mldsa_backend.py"
      - "tests/test_v48g_real_oqs_mldsa_backend.py"
      - "scripts/assert_real_oqs_junit_not_skipped.py"
      - "docs/v4/REAL_CRYPTO_BACKEND.md"
      - "docs/v4/TEST_MATRIX.md"
      - "pyproject.toml"
      - ".github/workflows/shield-v4-real-oqs.yml"

permissions:
  contents: read

jobs:
  real-oqs-mldsa:
    runs-on: ubuntu-latest

    env:
      SHIELD_V4_REAL_OQS: "1"
      LD_LIBRARY_PATH: "/usr/local/lib"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential git libssl-dev

      - name: Build and install liboqs
        run: |
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs.git
          cmake -S liboqs -B liboqs/build -GNinja \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build liboqs/build --parallel 2
          sudo cmake --install liboqs/build
          sudo ldconfig

      - name: Install Python dependencies and liboqs-python
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[test]"
          python -m pip install pytest
          python -m pip install "git+https://github.com/open-quantum-safe/liboqs-python.git"

      - name: Run gated real liboqs ML-DSA proof
        run: |
          python -m pytest --override-ini addopts='' \
            tests/test_v48g_real_oqs_mldsa_backend.py \
            -q --junitxml=shield-v4-real-oqs-results.xml

      - name: Assert real liboqs proof was not skipped
        if: always()
        run: |
          python scripts/assert_real_oqs_junit_not_skipped.py shield-v4-real-oqs-results.xml
